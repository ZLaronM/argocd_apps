#     port: 80
# readinessProbe:
#   httpGet:
#     path: /
#     port: 80
# startupProbe:
#   httpGet:
#     path: /
#     port: 80

#  THIS SHOULD ALLOW ME TO ACTUALLY USE IT ON MY LOCAL NETWORK

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

podSecurityContext: {}

securityContext:
  capabilities:
    add:
      - NET_ADMIN

nodeSelector:
  kubernetes.io/hostname: k3  # run: kubectl get nodes

